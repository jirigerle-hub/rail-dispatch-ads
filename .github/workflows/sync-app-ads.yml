name: Sync app-ads.txt to GitHub Pages root

on:
  push:
    branches:
      - main
    paths:
      - app-ads.txt
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout jirigerle-hub.github.io
        uses: actions/checkout@v4
        with:
          repository: jirigerle-hub/jirigerle-hub.github.io
          path: pages-root
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}

      - name: Copy app-ads.txt
        run: cp app-ads.txt pages-root/app-ads.txt

      - name: Commit and push
        working-directory: pages-root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-ads.txt
          git diff --cached --quiet || git commit -m "Sync app-ads.txt from ${{ github.repository }}"
          git push
