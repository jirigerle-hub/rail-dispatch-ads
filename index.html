<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rail Dispatch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    img.logo {
      max-width: 280px;
      width: 80%;
      margin-bottom: 24px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: #f0c040;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    p.desc {
      font-size: 1rem;
      color: #aaa;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    a.badge {
      display: inline-block;
      background: #f0c040;
      color: #1a1a2e;
      font-weight: bold;
      font-size: 1rem;
      padding: 12px 28px;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.2s;
    }
    a.badge:hover { background: #ffd966; }
    footer {
      margin-top: 48px;
      font-size: 0.75rem;
      color: #555;
    }

  <img class="logo" src="logo.png" alt="Rail Dispatch logo">

</html>
